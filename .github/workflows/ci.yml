# =============================================================================
# GitHub Actions CI — F1 TeamBuilder
# =============================================================================
# Triggers: push to main, any pull request targeting main
#
# Pipeline:
#   quality  → ESLint + TypeScript type-check
#   build    → Next.js production build  (needs: quality)
#   e2e      → Playwright tests          (needs: build)
#
# E2E uses the REAL Neon PostgreSQL database via GitHub secrets.
# Add the following secrets in your repo settings:
#   DATABASE_URL        → Neon pooled connection string
#   DIRECT_DATABASE_URL → Neon direct connection string
#   SENTRY_DSN          → Sentry DSN (optional, set to empty string to skip)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Sentry telemetry disabled during CI to avoid noise
  SENTRY_ENVIRONMENT: 'ci'
  NEXT_TELEMETRY_DISABLED: '1'

# =============================================================================
# Job 1: Lint & Type Check
# =============================================================================
jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

  # =============================================================================
  # Job 2: Production Build
  # =============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Build Next.js (production)
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-32-characters-long!!' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || '' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN || '' }}

      # Cache the build output for the E2E job
      - name: Cache Next.js build
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            node_modules
          key: nextjs-build-${{ github.sha }}

  # =============================================================================
  # Job 3: Playwright E2E Tests
  # =============================================================================
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore the cached build from the build job
      - name: Restore Next.js build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            node_modules
          key: nextjs-build-${{ github.sha }}

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Install Playwright browsers (Chromium + Firefox + WebKit)
        run: npx playwright install --with-deps chromium firefox webkit

      # ── Run tests ──────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: npx playwright test
        env:
          CI: 'true'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-dummy-secret-32-characters-long!!' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN || '' }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN || '' }}
          # Disable Sentry reporting during tests
          NEXT_PUBLIC_SENTRY_DSN: ''

      # ── Artifacts (always upload on failure or retry) ──────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright traces (retry artifacts)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ github.run_id }}
          path: test-results/
          retention-days: 14
